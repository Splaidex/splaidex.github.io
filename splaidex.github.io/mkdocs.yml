extra:
  projects:
  - description: Парсер изображений из Steam Community по названию игры
    description_en: Image parser for the Steam Community based on game title
    features:
    - Поиск игры прямо внутри приложения
    - Подключение через Steam API
    - Создание папок для каждой игры
    - Без лимитов на выгрузку
    - GUI с анимациями на PyQt6
    features_en:
    - Search for games right within the app
    - Connecting via the Steam API
    - Creating folders for each game
    - No upload limits
    - GUI with animations using PyQt6
    github: ''
    name: SteamParser
    stack: PyQt6, Steam API, Python
  - description: Генератор JSON-файлов из CSV с автодокументацией
    description_en: JSON File Generator from CSV with Auto-Documentation
    features:
    - Загрузка CSV — на выходе готовый JSON
    - Уникальные ключи при каждой генерации
    - Поддержка массивов
    - Автоматически создаёт .md с расшифровкой ключей
    - Кастомное имя файла через GUI
    features_en:
    - 'Upload CSV — Output: JSON'
    - Unique keys are generated each time
    - Array support
    - Automatically creates an .md file containing the key decryption
    - Custom file name via the GUI
    github: ''
    name: JsonGenerator
    stack: PyQt6, Python, CSV/JSON
  - description: Инструмент для удаления вотермарок с видео
    description_en: A tool for removing watermarks from videos
    features:
    - Превью видео прямо в приложении
    - Выделение зоны мышкой
    - Мультивыбор зон очистки
    - GUI на PyQt6
    features_en:
    - Video preview right in the app
    - Selecting an area with the mouse
    - Multiple selection of cleaning zones
    - GUI on PyQt6
    github: ''
    name: WMCut
    stack: PyQt6, Python, OpenCV
  social:
  - icon: fontawesome/brands/instagram
    link: https://www.instagram.com/splaidex_python
    name: Instagram
  - icon: fontawesome/brands/telegram
    link: https://t.me/imwaited
    name: Telegram
extra_css:
- stylesheets/extra.css
markdown_extensions:
- md_in_html
nav:
  - Главная: index.md
  - Проекты: projects.md
  - Обо мне: about.md
plugins:
- search
- macros
- i18n:
    default_language: ru
    languages:
    - default: true
      locale: ru
      name: Русский
    - locale: en
      name: English
      nav_translations:
        Главная: Home
        Проекты: Projects
        Обо мне: About
site_author: SplaidEX
site_description: Коллекция моих полезных Python-скриптов
site_name: Python Портфолио — SplaidEX
theme:
  custom_dir: docs/overrides
  favicon: assets/favicon.png
  features:
  - navigation.tabs
  - navigation.sections
  - content.code.copy
  - search.suggest
  - navigation.path
  language: ru
  logo: assets/logo.png
  name: material
  palette:
    accent: red
    primary: black
    scheme: slate
