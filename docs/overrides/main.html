{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<style>
  #loader {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000000;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  #loader-line {
    width: 0%;
    height: 2px;
    background: #cc0000;
    position: absolute;
    top: 50%;
    box-shadow: 0 0 12px #cc0000;
    transition: width 0.6s ease;
  }

  #loader-text {
    font-family: 'Share Tech Mono', monospace;
    color: #ffffff;
    font-size: 2rem;
    letter-spacing: 0.3em;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.3s forwards;
  }

  #loader-text span {
    color: #cc0000;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
{% endblock %}

{% block content %}
<div id="loader">
  <div id="loader-line"></div>
  <div id="loader-text">Splaid<span>EX</span></div>
</div>
{{ super() }}

<script>
  window.addEventListener('load', function() {
    const line = document.getElementById('loader-line');
    const loader = document.getElementById('loader');

    line.style.width = '100%';

    setTimeout(function() {
      loader.style.transition = 'opacity 0.5s ease';
      loader.style.opacity = '0';
      setTimeout(function() {
        loader.style.display = 'none';
      }, 500);
    }, 900);
  });
</script>
{% endblock %}
