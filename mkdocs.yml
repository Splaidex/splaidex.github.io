site_name: Python Портфолио — SplaidEX
site_description: Коллекция моих полезных Python-скриптов
site_author: SplaidEX

theme:
  custom_dir: docs/overrides
  name: material
  language: ru
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    scheme: slate
    primary: black
    accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search
  - macros

nav:
  - Главная: index.md
  - Проекты: projects.md
  - Обо мне: about.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/splaidex_python
      name: Instagram
    - icon: fontawesome/brands/telegram
      link: https://t.me/imwaited
      name: Telegram