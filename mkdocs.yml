site_name: Python Портфолио — SplaidEX
site_description: Коллекция моих полезных Python-скриптов
site_author: SplaidEX

theme:
  custom_dir: docs/overrides
  name: material
  language: ru
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    scheme: slate
    primary: black
    accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
    - navigation.path

plugins:
  - search
  - macros
  - i18n:
      default_language: ru
      languages:
        - locale: ru
          name: Русский
          default: true
        - locale: en
          name: English

nav:
  - Главная: index.md
  - Проекты: projects.md
  - Обо мне: about.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/splaidex_python
      name: Instagram
    - icon: fontawesome/brands/telegram
      link: https://t.me/imwaited
      name: Telegram
  projects:
    - name: SteamParser
      description: Парсер изображений из Steam Community по названию игры
      stack: PyQt6, Steam API, Python
      github: ""
      features:
        - Поиск игры прямо внутри приложения
        - Подключение через Steam API
        - Создание папок для каждой игры
        - Без лимитов на выгрузку
        - GUI с анимациями на PyQt6

    - name: JsonGenerator
      description: Генератор JSON-файлов из CSV с автодокументацией
      stack: PyQt6, Python, CSV/JSON
      github: ""
      features:
        - Загрузка CSV — на выходе готовый JSON
        - Уникальные ключи при каждой генерации
        - Поддержка массивов
        - Автоматически создаёт .md с расшифровкой ключей
        - Кастомное имя файла через GUI

    - name: WMCut
      description: Инструмент для удаления вотермарок с видео
      stack: PyQt6, Python, OpenCV
      github: ""
      features:
        - Превью видео прямо в приложении
        - Выделение зоны мышкой
        - Мультивыбор зон очистки
        - GUI на PyQt6